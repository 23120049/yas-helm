hostname: identity.yas.local.com
ingress:
  enabled: true
  className: nginx
backofficeRedirectUrls:
  - http://dev-backoffice.yas.local.com
  - http://staging-backoffice.yas.local.com
storefrontRedirectUrls:
  - http://dev-storefront.yas.local.com
  - http://staging-storefront.yas.local.com
apiRedirectUrls:
  - http://dev-api.yas.local.com
  - http://staging-api.yas.local.com
postgresql:
  username: yasadminuser
  password: admin

bootstrapAdmin:
  username: admin
  password: admin

realmImport:
  # Recovery bootstrap. Disable after yas-realm-kc-v2 has completed; the
  # idempotent PostSync reconciler below then owns the desired realm state.
  enabled: false
  name: yas-realm-kc-v2

realmReconciler:
  enabled: true
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.0.2"
    pullPolicy: IfNotPresent
  backoffLimit: 2
  activeDeadlineSeconds: 900
